services:
  app:
    image: nginx:alpine
    container_name: app_02_fazservico
    restart: always
    volumes:
      - /var/www/fazservico:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:4102:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  web:
    external: true
